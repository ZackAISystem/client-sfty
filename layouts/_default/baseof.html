<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>

  <!-- Montserrat font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Main CSS -->
  <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png">

  <!-- Open Graph / WhatsApp / Telegram -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Finstar Capital">
  <meta property="og:title" content="Финстар Капитал — Золотоматы">
  <meta property="og:description" content="Инвестиционный проект на базе реальных активов, фондовой структуры и инфраструктурной модели для квалифицированных инвесторов.">
  <meta property="og:image" content="https://50pribyli.ru/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="{{ .Permalink }}">

  <!-- Twitter / X preview -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Финстар Капитал — Золотоматы">
  <meta name="twitter:description" content="Инвестиционный проект на базе реальных активов, фондовой структуры и инфраструктурной модели для квалифицированных инвесторов.">
  <meta name="twitter:image" content="https://50pribyli.ru/og-image.jpg">

</head>
<body>
  {{ block "main" . }}{{ end }}
</body>
</html>
