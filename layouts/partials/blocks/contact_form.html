<section class="contact-form" id="contact">
  <div class="container contact-form__container">

    <div class="contact-form__panel">

      <!-- LEFT: circle + image -->
      <div class="contact-form__left" aria-hidden="true">
        <div class="contact-form__circle"></div>

        <img
          class="contact-form__img"
          src="{{ .contact_form_image_src_fixed }}"
          alt=""
          loading="lazy"
        >
      </div>

      <!-- RIGHT: text + button -->
      <div class="contact-form__right">
        <h2 class="contact-form__title">{{ .contact_form_title }}</h2>

        <p class="contact-form__text">
          {{ .contact_form_text }}
        </p>

        <a
          class="contact-form__btn js-open-lead"
          href="#contact"
          data-source="contact_form"
          data-modal-title="{{ .contact_form_title }}"
          data-cta-text="{{ .contact_form_cta }}"
          data-cta-color="#267898"
        >
          {{ .contact_form_cta }}
        </a>
      </div>

    </div>
  </div>
</section>
